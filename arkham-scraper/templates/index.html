<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arkham Address Scraper</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0f;
  --surface: #111118;
  --surface2: #1a1a24;
  --border: rgba(255,255,255,0.07);
  --border-active: rgba(99,179,237,0.5);
  --text: #e8e8f0;
  --muted: #6b6b80;
  --accent: #63b3ed;
  --accent2: #76e4a9;
  --danger: #fc8181;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Space Grotesk', sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.6;
}

.grid-bg {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size: 40px 40px;
}

.container {
  position: relative; z-index: 1;
  max-width: 860px; margin: 0 auto; padding: 3rem 2rem;
}

header {
  margin-bottom: 3rem;
  display: flex; align-items: baseline; justify-content: space-between;
}

.logo {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 300;
  color: var(--muted);
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

.logo span { color: var(--accent); }

#login-status {
  font-family: var(--mono);
  font-size: 11px;
  display: flex; align-items: center; gap: 8px;
}

.dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--muted);
  transition: background 0.3s;
}
.dot.online { background: var(--accent2); box-shadow: 0 0 6px var(--accent2); }

/* Cards */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.5rem;
  margin-bottom: 1rem;
}

.card-title {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 1.25rem;
}

/* Login */
#login-panel { animation: fadeIn 0.3s ease; }
#main-panel { display: none; animation: fadeIn 0.3s ease; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.field { margin-bottom: 1rem; }
.field label {
  display: block;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 6px;
  letter-spacing: 0.08em;
}

input[type=text], input[type=email], input[type=password] {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 13px;
  outline: none;
  transition: border-color 0.2s;
}
input:focus { border-color: var(--accent); }

/* Buttons */
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 20px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text);
  font-family: var(--mono);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.05em;
}
.btn:hover { border-color: var(--accent); color: var(--accent); }
.btn-primary {
  background: var(--accent);
  border-color: var(--accent);
  color: #0a0a0f;
  font-weight: 500;
}
.btn-primary:hover { background: #90cdf4; border-color: #90cdf4; color: #0a0a0f; }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-sm { padding: 6px 14px; font-size: 11px; }
.btn-danger:hover { border-color: var(--danger); color: var(--danger); }

/* Tags */
.tag-group { display: flex; flex-wrap: wrap; gap: 6px; }
.tag {
  padding: 5px 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
  font-family: var(--mono);
  font-size: 11px;
  cursor: pointer;
  color: var(--muted);
  background: transparent;
  transition: all 0.15s;
  letter-spacing: 0.05em;
}
.tag:hover { border-color: var(--accent); color: var(--accent); }
.tag.active { border-color: var(--accent); color: var(--accent); background: rgba(99,179,237,0.08); }

/* Row layout */
.row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
@media (max-width: 600px) { .row { grid-template-columns: 1fr; } }

/* Results */
#results-panel { display: none; }
.stats-bar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 1rem;
}
.stat {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
}
.stat span { color: var(--accent2); font-size: 18px; font-weight: 300; }

table {
  width: 100%;
  border-collapse: collapse;
  font-family: var(--mono);
  font-size: 12px;
}
th {
  text-align: left;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  color: var(--muted);
  font-weight: 400;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
td {
  padding: 8px 12px;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  color: var(--text);
  word-break: break-all;
}
tr:hover td { background: var(--surface2); }

.chain-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 10px;
  border: 1px solid var(--border);
  color: var(--muted);
}

/* Loading */
.loading {
  display: none;
  align-items: center;
  gap: 10px;
  padding: 1rem 0;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--muted);
}
.spinner {
  width: 16px; height: 16px;
  border: 1.5px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.error-msg {
  display: none;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--danger);
  padding: 10px 14px;
  border: 1px solid rgba(252,129,129,0.2);
  border-radius: 8px;
  background: rgba(252,129,129,0.05);
  margin-top: 1rem;
}

.divider { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }

#filter-input {
  width: 200px;
  font-size: 12px;
  padding: 6px 12px;
}
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="container">

<header>
  <div class="logo">// <span>Arkham</span> Address Scraper</div>
  <div id="login-status">
    <div class="dot" id="status-dot"></div>
    <span id="status-text" style="color:var(--muted)">not connected</span>
    <button class="btn btn-sm btn-danger" id="logout-btn" style="display:none" onclick="logout()">logout</button>
  </div>
</header>

<!-- Login Panel -->
<div id="login-panel">
  <div class="card">
    <div class="card-title">// arkham credentials</div>
    <div class="row">
      <div class="field">
        <label>EMAIL</label>
        <input type="email" id="email" placeholder="you@example.com">
      </div>
      <div class="field">
        <label>PASSWORD</label>
        <input type="password" id="password" placeholder="••••••••">
      </div>
    </div>
    <button class="btn btn-primary" onclick="login()" id="login-btn">
      <span>connect</span>
    </button>
    <div class="loading" id="login-loading">
      <div class="spinner"></div>
      <span id="login-loading-text">launching browser...</span>
    </div>
    <div class="error-msg" id="login-error"></div>
  </div>
</div>

<!-- Main Panel -->
<div id="main-panel">
  <div class="card">
    <div class="card-title">// target entity</div>
    <div class="field">
      <label>ENTITY ID</label>
      <input type="text" id="entity-id" placeholder="e.g. excoino / nobitex / wallex-ir">
    </div>
  </div>

  <div class="row">
    <div class="card">
      <div class="card-title">// chains</div>
      <div class="tag-group" id="chain-tags">
        <span class="tag active" data-val="tron">TRON</span>
        <span class="tag active" data-val="ethereum">ETH</span>
        <span class="tag active" data-val="bsc">BSC</span>
        <span class="tag" data-val="arbitrum">Arbitrum</span>
        <span class="tag" data-val="polygon">Polygon</span>
        <span class="tag" data-val="ton">TON</span>
        <span class="tag" data-val="bitcoin">BTC</span>
      </div>
    </div>

    <div class="card">
      <div class="card-title">// min amount (usd)</div>
      <div class="tag-group" id="amount-tags">
        <span class="tag" data-val="1000">$1,000</span>
        <span class="tag active" data-val="10000">$10,000</span>
        <span class="tag" data-val="100000">$100,000</span>
      </div>
    </div>
  </div>

  <div style="display:flex; gap:10px; align-items:center; margin-bottom:1rem;">
    <button class="btn btn-primary" onclick="scrape()" id="scrape-btn">
      <span>run scrape</span>
    </button>
    <button class="btn btn-sm" onclick="downloadCSV()" id="download-btn" style="display:none">
      export csv
    </button>
  </div>

  <div class="loading" id="scrape-loading">
    <div class="spinner"></div>
    <span id="scrape-loading-text">fetching transfers...</span>
  </div>
  <div class="error-msg" id="scrape-error"></div>
</div>

<!-- Results -->
<div id="results-panel">
  <div class="card" style="padding: 1.25rem 1.5rem;">
    <div class="stats-bar">
      <div class="stat">addresses found: <span id="total-count">0</span></div>
      <input type="text" id="filter-input" placeholder="filter by name / address..." oninput="filterTable()">
    </div>
    <div style="overflow-x:auto; max-height: 480px; overflow-y:auto;">
      <table id="result-table">
        <thead>
          <tr>
            <th>Address</th>
            <th>Name / Label</th>
            <th>Chain</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </div>
</div>

</div>

<script>
let allData = [];

// Tags toggle
document.querySelectorAll('#chain-tags .tag').forEach(t => {
  t.addEventListener('click', () => t.classList.toggle('active'));
});
document.querySelectorAll('#amount-tags .tag').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('#amount-tags .tag').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
  });
});

function getSelected(groupId) {
  return [...document.querySelectorAll(`#${groupId} .tag.active`)].map(t => t.dataset.val);
}

async function checkLogin() {
  const r = await fetch('/api/check_login', { credentials: 'include' });
  const d = await r.json();
  if (d.logged_in) showMainPanel();
}

async function login() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if (!email || !password) return;

  document.getElementById('login-btn').disabled = true;
  document.getElementById('login-loading').style.display = 'flex';
  document.getElementById('login-error').style.display = 'none';

  const msgs = ['launching browser...', 'navigating to arkham...', 'submitting credentials...', 'verifying session...'];
  let i = 0;
  const t = setInterval(() => {
    document.getElementById('login-loading-text').textContent = msgs[Math.min(i++, msgs.length-1)];
  }, 2500);

  try {
    const r = await fetch('/api/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      credentials: 'include',
      body: JSON.stringify({ email, password })
    });
    const d = await r.json();
    clearInterval(t);
    if (d.success) {
      showMainPanel();
    } else {
      document.getElementById('login-error').textContent = d.error || '登录失败';
      document.getElementById('login-error').style.display = 'block';
      document.getElementById('login-btn').disabled = false;
    }
  } catch(e) {
    clearInterval(t);
    document.getElementById('login-error').textContent = '网络错误: ' + e.message;
    document.getElementById('login-error').style.display = 'block';
    document.getElementById('login-btn').disabled = false;
  }
  document.getElementById('login-loading').style.display = 'none';
}

function showMainPanel() {
  document.getElementById('login-panel').style.display = 'none';
  document.getElementById('main-panel').style.display = 'block';
  document.getElementById('status-dot').classList.add('online');
  document.getElementById('status-text').textContent = 'connected';
  document.getElementById('status-text').style.color = 'var(--accent2)';
  document.getElementById('logout-btn').style.display = 'inline-flex';
}

async function logout() {
  await fetch('/api/logout', { method: 'POST', credentials: 'include' });
  location.reload();
}

async function scrape() {
  const entity = document.getElementById('entity-id').value.trim();
  if (!entity) { alert('请输入 entity id'); return; }

  const chains = getSelected('chain-tags');
  const amount = getSelected('amount-tags')[0] || '10000';

  document.getElementById('scrape-btn').disabled = true;
  document.getElementById('scrape-loading').style.display = 'flex';
  document.getElementById('scrape-error').style.display = 'none';
  document.getElementById('results-panel').style.display = 'none';
  document.getElementById('download-btn').style.display = 'none';

  const msgs = ['fetching transfers...', 'paginating results...', 'deduplicating addresses...', 'almost done...'];
  let i = 0;
  const t = setInterval(() => {
    document.getElementById('scrape-loading-text').textContent = msgs[Math.min(i++, msgs.length-1)];
  }, 8000);

  try {
    const r = await fetch('/api/scrape', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      credentials: 'include',
      body: JSON.stringify({ entity_id: entity, chains, usd_gte: parseInt(amount) })
    });
    const d = await r.json();
    clearInterval(t);
    if (d.success) {
      allData = d.data;
      renderTable(allData);
      document.getElementById('total-count').textContent = d.total;
      document.getElementById('results-panel').style.display = 'block';
      document.getElementById('download-btn').style.display = 'inline-flex';
    } else {
      document.getElementById('scrape-error').textContent = d.error;
      document.getElementById('scrape-error').style.display = 'block';
    }
  } catch(e) {
    clearInterval(t);
    document.getElementById('scrape-error').textContent = '请求失败: ' + e.message;
    document.getElementById('scrape-error').style.display = 'block';
  }
  document.getElementById('scrape-btn').disabled = false;
  document.getElementById('scrape-loading').style.display = 'none';
}

function renderTable(data) {
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = data.map(row => `
    <tr>
      <td style="font-size:11px;color:var(--accent)">${row.address}</td>
      <td>${row.name}</td>
      <td><span class="chain-badge">${row.chainType}</span></td>
    </tr>
  `).join('');
}

function filterTable() {
  const q = document.getElementById('filter-input').value.toLowerCase();
  const filtered = allData.filter(r =>
    r.address.toLowerCase().includes(q) || r.name.toLowerCase().includes(q)
  );
  renderTable(filtered);
}

function downloadCSV() {
  const rows = [['address','name','chainType'], ...allData.map(r => [r.address, r.name, r.chainType])];
  const csv = rows.map(r => r.join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `arkham_${document.getElementById('entity-id').value}_${Date.now()}.csv`;
  a.click();
}

// Enter key
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (document.getElementById('login-panel').style.display !== 'none') login();
  }
});

checkLogin();
</script>
</body>
</html>
